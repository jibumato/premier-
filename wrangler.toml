# Cloudflare Pages 設定（Next.js は @cloudflare/next-on-pages でビルド）。
# デプロイ手順は docs/SETUP.md を参照。
name = "premier"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

# next-on-pages のビルド出力先
pages_build_output_dir = ".vercel/output/static"

# 画像用 R2 バケット（Worker/Functions から binding `IMAGES` で参照）。
# バケットは事前に作成: `wrangler r2 bucket create premier-images`
[[r2_buckets]]
binding = "IMAGES"
bucket_name = "premier-images"
